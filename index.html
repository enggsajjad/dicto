<!doctype html>
<html lang="de" data-bs-theme="light">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Searchable German dictionary for A1, A2, B1, B2, C1, C2 and BSK_B2.">
<title>Generalisiertes Deutsch-Wörterbuch</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--page-bg:#f5f7fb;--page-text:#1f2937;--muted:#64748b;--card-bg:#fff;--border:#e5e7eb;--hover:#f0f4ff;--ex-bg:#f8fafc}
[data-bs-theme=dark]{--page-bg:#0f172a;--page-text:#e2e8f0;--muted:#94a3b8;--card-bg:#1e293b;--border:#334155;--hover:#283548;--ex-bg:#172033}
body{background:var(--page-bg);color:var(--page-text);font-family:Inter,sans-serif}.content-card{background:var(--card-bg);border:0;border-radius:1rem;box-shadow:0 .5rem 1.25rem rgba(0,0,0,.08)}
.search-wrap{position:sticky;top:0;z-index:20;background:var(--page-bg);padding:.7rem 0}.searchbox{width:100%;padding:.75rem 1rem;border:2px solid var(--border);border-radius:.75rem;background:var(--card-bg);color:var(--page-text)}
.filters{display:flex;gap:.35rem;flex-wrap:wrap}.filters button{border:1.5px solid var(--border);background:transparent;color:var(--muted);border-radius:2rem;padding:.28rem .7rem;font-size:.8rem;font-weight:700}.filters button.active{background:#1d4ed8;color:white;border-color:#1d4ed8}
.word-card{padding:.7rem 0;border-bottom:1px solid var(--border)}.word-card:hover{background:var(--hover);margin:0 -.5rem;padding-left:.5rem;padding-right:.5rem;border-radius:.5rem}.word-main{display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap}.word-de{font-weight:800}.word-en{color:var(--muted)}
.word-example{width:100%;margin-top:.3rem;padding:.4rem .65rem;background:var(--ex-bg);border-radius:.4rem;border-left:3px solid #1d4ed8;font-size:.86rem}.ex-en{color:var(--muted);font-style:italic}.grammar{width:100%;font-size:.78rem;color:#0d7d4d}.collocations{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.35rem}.collocations span{background:#f0f4ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:4px;padding:2px 8px;font-size:12px;font-style:italic}
.toolbar{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}.stats{font-size:.82rem;font-weight:700;color:#fff;background:#6c757d;padding:.35em .65em;border-radius:.375rem}.quiz-panel{display:none;background:var(--ex-bg);border:1px solid var(--border);border-radius:.8rem;padding:1rem}.quiz-panel.show{display:block}.answer{display:none}.answer.show{display:block}.btn-theme{margin-left:auto}
@media(max-width:600px){.content-card{padding:1rem!important}.btn-theme{margin-left:0}}
</style></head>
<body><main class="container py-4"><section class="content-card p-4 p-md-5">
<div class="toolbar mb-2"><h1 class="h3 mb-0">📖 Generalisiertes Wörterbuch</h1><button id="themeBtn" class="btn btn-sm btn-outline-secondary btn-theme">🌙 Theme</button></div>
<p class="text-secondary">A1 · A2 · B1 · B2 · C1 · C2 · BSK_B2 — German, English, examples, grammar and collocations.</p>
<div class="search-wrap"><input id="search" class="searchbox" placeholder="Search German, English, example or collocation …"></div>
<div class="toolbar mb-2"><strong>Level:</strong><div class="filters" id="levelFilters"></div><span class="stats" id="count">0 words</span></div>
<div class="toolbar mb-3"><strong>Wortart:</strong><div class="filters" id="posFilters"></div></div>
<div class="toolbar mb-3"><button id="quiz20" class="btn btn-primary btn-sm">Test: 20 Wörter</button><button id="quiz30" class="btn btn-outline-primary btn-sm">Test: 30 Wörter</button><button id="clear" class="btn btn-outline-secondary btn-sm">Filter löschen</button></div>
<div id="quiz" class="quiz-panel mb-3"></div><div id="list"></div><div id="empty" class="text-center py-5 text-secondary" hidden>🔍 No matching words found.</div>
</section></main>
<script>
const LEVELS=['ALL','A1','A2','B1','B2','C1','C2','BSK_B2'];
const POS=[['ALL','Alle'],['noun','Nomen'],['verb','Verben'],['adjective','Adjektive'],['adverb','Adverbien'],['phrase','Wendungen'],['preposition','Präpositionen'],['conjunction','Konjunktionen']];
const colors={A1:'#16a34a',A2:'#2563eb',B1:'#7c3aed',B2:'#ea580c',C1:'#dc2626',C2:'#0d9488',BSK_B2:'#be185d'};
let words=[], level='ALL', pos='ALL', query='';
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const norm=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ß/g,'ss');
function makeFilters(){
 const lf=document.querySelector('#levelFilters'); LEVELS.forEach(x=>{let b=document.createElement('button');b.textContent=x==='ALL'?'All':x;b.dataset.v=x;b.onclick=()=>{level=x;active(lf,x);render()};lf.append(b)});active(lf,'ALL');
 const pf=document.querySelector('#posFilters'); POS.forEach(([x,t])=>{let b=document.createElement('button');b.textContent=t;b.dataset.v=x;b.onclick=()=>{pos=x;active(pf,x);render()};pf.append(b)});active(pf,'ALL');
}
function active(root,v){root.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.v===v))}
function filtered(){return words.filter(w=>(level==='ALL'||w.level===level)&&(pos==='ALL'||w.pos===pos)&&(!query||norm([w.german,w.article,w.english,w.example_de,w.example_en,w.grammar,w.classification,...(w.collocations||[])].join(' ')).includes(query)))}
function card(w){let col=(w.collocations||[]).map(x=>`<span>${esc(x)}</span>`).join('');return `<article class="word-card"><div class="word-main"><span class="word-de">${esc(w.german)}</span>${w.article?`<span>${esc(w.article)}</span>`:''}<span class="badge rounded-pill" style="background:${colors[w.level]||'#64748b'}">${esc(w.level)}</span><span class="word-en">${esc(w.english)}</span>${w.classification?`<div class="small text-secondary mt-1">${esc(w.classification)}</div>`:''}${w.grammar?`<div class="grammar"><b>+</b> ${esc(w.grammar)}</div>`:''}${w.example_de?`<div class="word-example"><span>${esc(w.example_de)}</span><br><span class="ex-en">${esc(w.example_en)}</span>${col?`<div class="collocations">${col}</div>`:''}</div>`:''}</div></article>`}
function render(){let a=filtered();document.querySelector('#count').textContent=`${a.length} word${a.length===1?'':'s'}`;document.querySelector('#list').innerHTML=a.map(card).join('');document.querySelector('#empty').hidden=!!a.length}
function quiz(n){let pool=filtered();if(!pool.length)return;pool=[...pool].sort(()=>Math.random()-.5).slice(0,Math.min(n,pool.length));let i=0,score=0;const q=document.querySelector('#quiz');q.classList.add('show');function show(){let w=pool[i];q.innerHTML=`<div class="d-flex justify-content-between"><b>Question ${i+1}/${pool.length}</b><span>Score: ${score}</span></div><h3 class="my-3">${esc(w.german)}</h3><input id="qa" class="form-control" placeholder="English meaning"><div id="ans" class="answer mt-3"><b>Answer:</b> ${esc(w.english)}<br><small>${esc(w.example_de)}</small></div><div class="mt-3"><button id="check" class="btn btn-success btn-sm">Check</button> <button id="next" class="btn btn-primary btn-sm" disabled>Next</button> <button id="closeq" class="btn btn-outline-secondary btn-sm">Close</button></div>`;q.querySelector('#check').onclick=()=>{let ok=norm(q.querySelector('#qa').value).split(/[,;/]/).some(x=>x.trim()&&norm(w.english).includes(x.trim()));if(ok)score++;q.querySelector('#ans').classList.add('show');q.querySelector('#next').disabled=false};q.querySelector('#next').onclick=()=>{i++;if(i>=pool.length){q.innerHTML=`<h3>Finished</h3><p>Your score: <b>${score}/${pool.length}</b></p><button class="btn btn-primary btn-sm" onclick="document.querySelector('#quiz').classList.remove('show')">Close</button>`}else show()};q.querySelector('#closeq').onclick=()=>q.classList.remove('show')};show();q.scrollIntoView({behavior:'smooth'})}
document.querySelector('#search').addEventListener('input',e=>{query=norm(e.target.value);render()});document.querySelector('#quiz20').onclick=()=>quiz(20);document.querySelector('#quiz30').onclick=()=>quiz(30);document.querySelector('#clear').onclick=()=>{level=pos='ALL';query='';document.querySelector('#search').value='';active(document.querySelector('#levelFilters'),'ALL');active(document.querySelector('#posFilters'),'ALL');render()};
document.querySelector('#themeBtn').onclick=()=>{let d=document.documentElement,n=d.getAttribute('data-bs-theme')==='dark'?'light':'dark';d.setAttribute('data-bs-theme',n);localStorage.setItem('theme',n)};document.documentElement.setAttribute('data-bs-theme',localStorage.getItem('theme')||'light');
makeFilters();
async function loadDictionary(){
  const files=['words.json','words_all.json','German_dictionary_A1_C2_BSK_B2.json'];
  let lastError;
  for(const file of files){
    try{
      const r=await fetch(file,{cache:'no-store'});
      if(!r.ok) throw new Error(`${file}: HTTP ${r.status}`);
      const data=await r.json();
      if(!Array.isArray(data)) throw new Error(`${file}: JSON root is not an array`);
      words=data;
      render();
      return;
    }catch(err){lastError=err;}
  }
  console.error(lastError);
  document.querySelector('#list').innerHTML='<div class="alert alert-warning">Dictionary data could not be loaded. Upload <strong>words.json</strong> beside index.html and reload the page.</div>';
}
loadDictionary();
</script></body></html>
